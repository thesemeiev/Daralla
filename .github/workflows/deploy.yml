name: Deploy Daralla Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger option

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Testing and code validation
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run tests
      run: |
        # Create test files if they don't exist
        mkdir -p tests
        echo "import pytest" > tests/__init__.py
        echo "def test_basic(): assert True" > tests/test_basic.py
        pytest tests/ -v

    - name: Lint code
      run: |
        pip install flake8
        flake8 bot/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bot/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # (Optional) can add image build later

  # Deploy to server
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check secrets presence
      run: |
        echo "SERVER_HOST: ${{ secrets.SERVER_HOST != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_USER: ${{ secrets.SERVER_USER != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_PORT: ${{ secrets.SERVER_PORT != '' && 'SET' || 'NOT SET' }}"
        echo "NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN != '' && 'SET' || 'NOT SET' }}"

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        timeout: 60s
        command_timeout: 10m
        script: |
          # Simple and reliable deployment
          echo "Starting deployment..."
          
          # Create working directory
          sudo mkdir -p /root/Daralla
          cd /root/Daralla
          
          # Stop old bot
          echo "Stopping old bot..."
          sudo docker-compose down || true
          
          # Create backup structure
          echo "Preparing backup..."
          sudo mkdir -p /root/backups/data /root/backups/env
          timestamp=$(date +'%Y%m%d_%H%M%S')

          # Database backup - ПЕРЕД удалением папки!
          echo "Creating database backup..."
          if [ -d "data" ] && [ -n "$(ls -A data/*.db 2>/dev/null)" ]; then
            echo "Found databases for backup:"
            ls -l data/*.db
            sudo tar -czf "/root/backups/data/backup_${timestamp}.tar.gz" data/*.db
            echo "Database backup created: /root/backups/data/backup_${timestamp}.tar.gz"
            
            # Keep only 5 latest backups
            ls -t /root/backups/data/backup_*.tar.gz | tail -n +6 | xargs -r sudo rm -f
          else
            echo "No databases found to backup"
          fi

          # .env backup - ПЕРЕД удалением папки!
          if [ -f ".env" ]; then
            echo "Creating .env backup..."
            sudo cp .env "/root/backups/env/env_${timestamp}"
            # Keep only 5 latest .env copies
            ls -t /root/backups/env/env_* | tail -n +6 | xargs -r sudo rm -f
          fi
          
          # Download code directly to working directory
          echo "Downloading code..."
          sudo apt-get update -qq && sudo apt-get install -y -qq git sqlite3
          
          # Clone directly to working directory
          sudo rm -rf /root/Daralla
          sudo mkdir -p /root/Daralla
          cd /root
          echo "Current directory: $(pwd)"
          echo "Directory contents: $(ls -la)"
          sudo git clone https://thesemeiev:${{ secrets.GITHUB_TOKEN }}@github.com/thesemeiev/Daralla.git Daralla
          echo "After clone, directory contents: $(ls -la)"
          cd /root/Daralla
          echo "In Daralla directory: $(pwd)"
          
          sudo git checkout main
          sudo git pull origin main
          echo "Current commit: $(sudo git log --oneline -1)"
          
          # Restore data
          echo "Restoring data..."
          
          # Restore databases
          latest_db_backup=$(ls -t /root/backups/data/backup_*.tar.gz 2>/dev/null | head -n1)
          if [ -n "$latest_db_backup" ]; then
            echo "Restoring databases from $latest_db_backup..."
            sudo mkdir -p data
            sudo tar -xzf "$latest_db_backup" -C .
            echo "Databases restored from $latest_db_backup"
            
            # Verify restoration
            echo "Verifying database restoration..."
            if [ -f "data/referral_system.db" ]; then
              echo "Checking referral_system.db content..."
              sudo sqlite3 data/referral_system.db "SELECT COUNT(*) as total_referrals FROM referrals;" || echo "Cannot read referral_system.db"
              sudo sqlite3 data/referral_system.db "SELECT COUNT(*) as user_points FROM user_points;" || echo "Cannot read user_points table"
            fi
          else
            echo "Database backups not found - creating empty databases"
            sudo mkdir -p data
            sudo touch data/vpn_keys.db data/referral_system.db data/notifications.db
            echo "Empty databases created"
          fi

          # Restore .env
          latest_env=$(ls -t /root/backups/env/env_* 2>/dev/null | head -n1)
          if [ -n "$latest_env" ]; then
            echo "Restoring .env from $latest_env..."
            sudo cp "$latest_env" .env
            echo ".env file restored"
          else
            echo ".env backup not found"
          fi

          # Check restoration
          echo "Checking restored files..."
          echo "Databases:"
          ls -lh data/*.db || echo "Databases not found"
          
          # Verify database content
          if [ -f "data/vpn_keys.db" ]; then
            echo "Checking vpn_keys.db content..."
            sudo sqlite3 data/vpn_keys.db "SELECT name FROM sqlite_master WHERE type='table';" || echo "Cannot read vpn_keys.db"
          fi
          
          # Fix permissions after restoration
          sudo chown -R 1000:1000 data/ 2>/dev/null || true
          sudo chmod -R 666 data/*.db 2>/dev/null || true
          sudo chmod 755 data/ 2>/dev/null || true
          
          # Ensure data directory exists
          sudo mkdir -p data
          
          # Set permissions
          sudo chmod +x *.sh
          sudo chown -R 1000:1000 data/
          sudo chmod -R 666 data/*.db
          sudo chmod 755 data/
          
          # Install and configure ngrok
          echo "Installing ngrok..."
          
          # Check if NGROK_AUTH_TOKEN is set
          if [ -z "${{ secrets.NGROK_AUTH_TOKEN }}" ]; then
            echo "❌ NGROK_AUTH_TOKEN not set in GitHub Secrets!"
            echo "Please add NGROK_AUTH_TOKEN to GitHub Secrets"
            exit 1
          fi
          
          sudo mkdir -p /opt/ngrok
          cd /opt/ngrok
          sudo wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          sudo tar -xzf ngrok-v3-stable-linux-amd64.tgz
          sudo rm ngrok-v3-stable-linux-amd64.tgz
          sudo chmod +x ngrok
          sudo ln -sf /opt/ngrok/ngrok /usr/local/bin/ngrok
          
          # Create ngrok config
          echo "Configuring ngrok..."
          sudo mkdir -p /root/.config/ngrok
          sudo tee /root/.config/ngrok/ngrok.yml > /dev/null << EOF
          version: "2"
          authtoken: ${{ secrets.NGROK_AUTH_TOKEN }}
          tunnels:
            webhook:
              proto: http
              addr: 5000
          EOF
          
          # Start ngrok in background
          echo "Starting ngrok tunnel..."
          ngrok start webhook --config=/root/.config/ngrok/ngrok.yml &
          sleep 10
          
          # Get ngrok URL
          echo "Getting ngrok URL..."
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | grep -o '"public_url":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Ngrok URL: $NGROK_URL"
          
          # Update webhook URL in environment
          if [ -n "$NGROK_URL" ]; then
            echo "Updating webhook URL in .env..."
            WEBHOOK_URL="${NGROK_URL}/webhook/yookassa"
            echo "WEBHOOK_URL=$WEBHOOK_URL" | sudo tee -a .env
            echo "NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}" | sudo tee -a .env
            echo "Webhook URL set to: $WEBHOOK_URL"
            echo "NGROK_AUTH_TOKEN added to .env"
          else
            echo "Failed to get ngrok URL"
            # Still add NGROK_AUTH_TOKEN even if ngrok failed
            echo "NGROK_AUTH_TOKEN=${{ secrets.NGROK_AUTH_TOKEN }}" | sudo tee -a .env
            echo "NGROK_AUTH_TOKEN added to .env (ngrok failed)"
          fi
          
          # Return to project directory
          cd /root/Daralla
          
          # Verify code update
          echo "Verifying code update..."
          echo "Current commit: $(sudo git log --oneline -1)"
          echo "Bot.py last modified: $(sudo stat -c %y bot/bot.py)"
          
          # Clean up old logs and containers (safe approach)
          echo "Cleaning up old logs and containers..."
          # Stop and remove old containers
          sudo docker-compose down || true
          # Remove only dangling images (safer)
          timeout 30 sudo docker image prune -f || echo "Image prune timed out, continuing..."
          # Clean up build cache
          timeout 30 sudo docker builder prune -f || echo "Builder prune timed out, continuing..."
          
          # Start bot
          echo "Starting bot..."
          # Build containers on server
          sudo docker-compose build --no-cache
          
          # Start with environment variables
          echo "Starting bot with environment variables..."
          NGROK_AUTH_TOKEN="${{ secrets.NGROK_AUTH_TOKEN }}" WEBHOOK_URL="$WEBHOOK_URL" sudo docker-compose up -d
          
          # Check status
          echo "Checking status..."
          sleep 5
          sudo docker-compose ps
          
          # Final verification of data
          echo "Final data verification..."
          if [ -f "data/referral_system.db" ]; then
            echo "Final referral_system.db check:"
            sudo sqlite3 data/referral_system.db "SELECT COUNT(*) as total_referrals FROM referrals;" || echo "Cannot read referrals table"
            sudo sqlite3 data/referral_system.db "SELECT COUNT(*) as user_points FROM user_points;" || echo "Cannot read user_points table"
          fi
          
          echo "Deployment completed!"
          echo "Webhook URL: $WEBHOOK_URL"

    - name: Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "Deployment completed successfully!"
        else
          echo "Deployment failed!"
        fi

  # Rollback can be added later if needed
