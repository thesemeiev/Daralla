name: 🚀 Deploy Daralla Bot

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Тестирование и проверка кода
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: 🧪 Run tests
      run: |
        # Создаем тестовые файлы если их нет
        mkdir -p tests
        echo "import pytest" > tests/__init__.py
        echo "def test_basic(): assert True" > tests/test_basic.py
        pytest tests/ -v

    - name: 🔍 Lint code
      run: |
        pip install flake8
        flake8 bot/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bot/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # (Опционально) можно добавить сборку образа позже

  # Деплой на сервер
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔍 Check secrets presence
      run: |
        echo "SERVER_HOST: ${{ secrets.SERVER_HOST != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_USER: ${{ secrets.SERVER_USER != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_PORT: ${{ secrets.SERVER_PORT != '' && 'SET' || 'NOT SET' }}"

    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        timeout: 60s
        command_timeout: 10m
        script: |
          # Простой и надежный деплой
          echo "🚀 Начинаю деплой..."
          
          # Создаем рабочую папку
          sudo mkdir -p /root/Daralla
          cd /root/Daralla
          
          # Останавливаем старый бот
          echo "🛑 Останавливаю старый бот..."
          sudo docker-compose down || true
          
          # Сохраняем данные
          echo "📦 Сохраняю данные..."
          if [ -d "data" ]; then
            sudo cp -r data data_backup_$(date +'%Y%m%d_%H%M%S')
          fi
          if [ -f ".env" ]; then
            sudo cp .env .env_backup_$(date +'%Y%m%d_%H%M%S')
          fi
          
          # Скачиваем код
          echo "📥 Скачиваю код..."
          sudo apt-get update -qq && sudo apt-get install -y -qq git
          sudo rm -rf /tmp/Daralla
          sudo git clone https://thesemeiev:${{ secrets.GITHUB_TOKEN }}@github.com/thesemeiev/Daralla.git /tmp/Daralla
          cd /tmp/Daralla
          sudo git checkout main
          sudo git pull origin main
          echo "📋 Текущий коммит: $(sudo git log --oneline -1)"
          
          # Возвращаемся в рабочую папку
          cd /root/Daralla
          
          # Копируем файлы
          echo "📋 Копирую файлы..."
          sudo cp -r /tmp/Daralla/* .
          sudo rm -rf /tmp/Daralla
          
          # Восстанавливаем данные
          echo "🔄 Восстанавливаю данные..."
          sudo cp -r data_backup_* data/ 2>/dev/null || true
          sudo cp .env_backup_* .env 2>/dev/null || true
          
          # Исправляем права после восстановления
          sudo chown -R 1000:1000 data/ 2>/dev/null || true
          sudo chmod -R 666 data/*.db 2>/dev/null || true
          sudo chmod 755 data/ 2>/dev/null || true
          
          # Создаем папку data и файлы БД
          sudo mkdir -p data
          sudo touch data/vpn_keys.db data/referral_system.db data/notifications.db
          
          # Устанавливаем права
          sudo chmod +x *.sh
          sudo chown -R 1000:1000 data/
          sudo chmod -R 666 data/*.db
          sudo chmod 755 data/
          
          # Запускаем бота
          echo "🚀 Запускаю бота..."
          # Собираем контейнеры на сервере
          sudo docker-compose build --no-cache
          sudo docker-compose up -d
          
          # Проверяем статус
          echo "✅ Проверяю статус..."
          sleep 5
          sudo docker-compose ps
          
          echo "🎉 Деплой завершен!"

    - name: 📢 Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Деплой успешно завершен!"
        else
          echo "❌ Ошибка при деплое!"
        fi

  # Откат можно вернуть позже при необходимости
