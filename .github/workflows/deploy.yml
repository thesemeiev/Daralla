name: 🚀 Deploy Daralla Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Тестирование и проверка кода
  test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: 🧪 Run tests
      run: |
        # Создаем тестовые файлы если их нет
        mkdir -p tests
        echo "import pytest" > tests/__init__.py
        echo "def test_basic(): assert True" > tests/test_basic.py
        pytest tests/ -v

    - name: 🔍 Lint code
      run: |
        pip install flake8
        flake8 bot/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bot/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Сборка Docker образа
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: 🏗️ Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Деплой на сервер
  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔍 Debug secrets
      run: |
        echo "SERVER_HOST: ${{ secrets.SERVER_HOST != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_USER: ${{ secrets.SERVER_USER != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD != '' && 'SET' || 'NOT SET' }}"
        echo "SERVER_PORT: ${{ secrets.SERVER_PORT != '' && 'SET' || 'NOT SET' }}"
        echo "Workflow version: v2.0 - Updated $(date)"

    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        timeout: 60s
        command_timeout: 10m
        script_stop: true
        script: |
          # Переходим в папку /root/Daralla
          cd /root/Daralla
          
          # Создаем резервную копию данных если они есть
          echo "📦 Создаю резервную копию данных..."
          if [ -d "data" ]; then
            sudo cp -r data data_backup_$(date +'%Y%m%d_%H%M%S')
            echo "✅ Резервная копия создана"
          fi
          
          # Останавливаем старый бот
          echo "🛑 Останавливаю старый бот..."
          sudo docker-compose down || true
          
          # Обновляем код
          echo "📥 Обновляю код..."
          sudo git fetch origin
          sudo git reset --hard origin/main
          
          # Устанавливаем права на скрипты
          sudo chmod +x *.sh
          
          # Создаем папку для данных если не существует
          sudo mkdir -p data
          
          # Создаем пустые файлы БД если не существуют
          sudo touch data/vpn_keys.db data/referral_system.db data/notifications.db
          
          # Исправляем права на папку data (для Docker контейнера)
          sudo chown -R 1000:1000 data/
          sudo chmod -R 755 data/
          
          # Обновляем переменные окружения
          echo "🔧 Обновляю переменные окружения..."
          if [ -f .env.production ]; then
            sudo cp .env.production .env
          fi
          
          # Деплоим новую версию
          echo "🚀 Деплою новую версию..."
          sudo ./deploy.sh update
          
          # Исправляем права после деплоя
          echo "🔧 Исправляю права на базы данных..."
          sudo chown -R 1000:1000 data/
          sudo chmod -R 755 data/
          
          # Проверяем статус
          echo "✅ Проверяю статус..."
          sleep 10
          sudo docker-compose ps
          
          echo "🎉 Деплой завершен!"

    - name: 📢 Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Деплой успешно завершен!"
        else
          echo "❌ Ошибка при деплое!"
        fi

  # Откат при ошибке
  rollback:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
    - name: 🔄 Rollback deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          cd /home/${{ secrets.SERVER_USER }}/Daralla
          echo "🔄 Выполняю откат..."
          ./rollback.sh
