name: Guardrails CI

on:
  pull_request:
  push:
    branches: [ main, test ]
  workflow_dispatch:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run architecture and contracts checks
        run: |
          python scripts/check_arch_rules.py
          python scripts/check_http_contracts.py

      - name: Run frontend smoke checks
        run: |
          node --check webapp/app.js
          python scripts/check_frontend_smoke.py
