name: 💾 Daily Backup

on:
  schedule:
    # Каждый день в 3:00 UTC (6:00 МСК)
    - cron: '0 3 * * *'
  workflow_dispatch: # Ручной запуск

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 💾 Create backup
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        timeout: 60s
        command_timeout: 10m
        script: |
          cd /root/Daralla || cd /home/root/Daralla || find / -name "docker-compose.yml" -type f 2>/dev/null | head -1 | xargs dirname
          echo "💾 Создаю ежедневную резервную копию..."
          ./backup.sh "daily_backup_$(date +'%Y%m%d')"
          
          # Очищаем старые бэкапы (старше 7 дней)
          find ./backups -name "daily_backup_*.tar.gz" -mtime +7 -delete
          
          echo "✅ Резервная копия создана"

    - name: 📊 Backup status
      run: |
        echo "📊 Статус резервного копирования: ${{ job.status }}"
