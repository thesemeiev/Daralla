name: 💾 Daily Backup

on:
  schedule:
    # Каждый день в 3:00 UTC (6:00 МСК)
    - cron: '0 3 * * *'
  workflow_dispatch: # Ручной запуск

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6

    - name: 💾 Create backup
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        timeout: 60s
        command_timeout: 10m
        script: |
          DARALLA_DIR="/root/Daralla"
          if [ ! -d "$DARALLA_DIR" ]; then
            FOUND=$(find /root /home -maxdepth 4 -name "docker-compose.yml" 2>/dev/null | head -1)
            [ -n "$FOUND" ] && DARALLA_DIR="$(dirname "$FOUND")"
          fi
          cd "$DARALLA_DIR" || { echo "Project dir not found"; exit 1; }
          echo "💾 Создаю ежедневную резервную копию..."
          ./backup.sh "daily_$(date +'%Y%m%d_%H%M%S')"
          
          # Очищаем старые бэкапы (старше 7 дней)
          find ./backups -name "*.tar.gz" -mtime +7 -delete
          
          echo "✅ Резервная копия создана"

    - name: 📊 Backup status
      run: |
        echo "📊 Статус резервного копирования: ${{ job.status }}"
