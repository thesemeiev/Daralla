name: Deploy Daralla Bot to Test Server

on:
  push:
    branches: [ test ]  # Тестовая ветка
  workflow_dispatch:  # Manual trigger option

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Testing and code validation
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run tests
      run: pytest tests/ -v

    - name: Lint code
      run: |
        pip install flake8
        flake8 bot/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bot/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Deploy to test server
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'  # Тестовая ветка
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check secrets presence
      run: |
        echo "TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST != '' && 'SET' || 'NOT SET' }}"
        echo "TEST_SERVER_USER: ${{ secrets.TEST_SERVER_USER != '' && 'SET' || 'NOT SET' }}"
        echo "TEST_SERVER_PASSWORD: ${{ secrets.TEST_SERVER_PASSWORD != '' && 'SET' || 'NOT SET' }}"
        echo "TEST_SERVER_PORT: ${{ secrets.TEST_SERVER_PORT != '' && 'SET' || 'NOT SET' }}"
        echo "REPO_CLONE_TOKEN: ${{ secrets.REPO_CLONE_TOKEN != '' && 'SET' || 'NOT SET' }}"
        echo "WEBHOOK_DOMAIN: ${{ secrets.WEBHOOK_DOMAIN != '' && 'SET' || 'NOT SET' }}"

    - name: Deploy to test server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.TEST_SERVER_HOST }}
        username: ${{ secrets.TEST_SERVER_USER }}
        password: ${{ secrets.TEST_SERVER_PASSWORD }}
        port: ${{ secrets.TEST_SERVER_PORT || 22 }}
        timeout: 60s
        command_timeout: 10m
        script: |
          # Test environment deployment
          echo "🚀 Starting deployment to TEST server..."
          echo "📦 Branch: test"
          echo "🔧 Environment: TEST"
          
          # Create working directory
          sudo mkdir -p /root/Daralla
          cd /root/Daralla
          
          # Stop old bot
          echo "Stopping old bot..."
          # Use docker compose (new) or docker-compose (old)
          if docker compose version &> /dev/null 2>&1; then
            sudo docker compose down || true
          elif command -v docker-compose &> /dev/null; then
            sudo docker-compose down || true
          else
            echo "Docker Compose not available yet, will be installed later"
          fi
          
          # Create backup structure
          echo "Preparing backup..."
          sudo mkdir -p /root/backups/data /root/backups/env
          timestamp=$(date +'%Y%m%d_%H%M%S')

          # Database backup - ПЕРЕД удалением папки!
          echo "Creating database backup..."
          BACKUP_SUCCESS=false
          if [ -d "data" ] && [ -n "$(ls -A data/*.db 2>/dev/null)" ]; then
            echo "Found databases for backup:"
            ls -l data/*.db
            
            # Create backup with verification
            if sudo tar -czf "/root/backups/data/backup_${timestamp}.tar.gz" data/*.db; then
              # Verify backup integrity
              if sudo tar -tzf "/root/backups/data/backup_${timestamp}.tar.gz" > /dev/null 2>&1; then
                BACKUP_SIZE=$(sudo stat -c%s "/root/backups/data/backup_${timestamp}.tar.gz" 2>/dev/null || echo "0")
                if [ "$BACKUP_SIZE" -gt 1000 ]; then
                  echo "✅ Database backup created and verified: /root/backups/data/backup_${timestamp}.tar.gz (size: ${BACKUP_SIZE} bytes)"
                  BACKUP_SUCCESS=true
                else
                  echo "❌ ERROR: Backup file is too small (${BACKUP_SIZE} bytes), may be corrupted!"
                  sudo rm -f "/root/backups/data/backup_${timestamp}.tar.gz"
                fi
              else
                echo "❌ ERROR: Backup file is corrupted or invalid!"
                sudo rm -f "/root/backups/data/backup_${timestamp}.tar.gz"
              fi
            else
              echo "❌ ERROR: Failed to create backup!"
            fi
            
            # Keep only 5 latest backups (only if backup was successful)
            if [ "$BACKUP_SUCCESS" = true ]; then
              ls -t /root/backups/data/backup_*.tar.gz | tail -n +6 | xargs -r sudo rm -f
            fi
          else
            echo "No databases found to backup"
            BACKUP_SUCCESS=true  # No backup needed, but not an error
          fi
          
          # CRITICAL: Stop deployment if backup failed
          if [ "$BACKUP_SUCCESS" != true ]; then
            echo "❌ CRITICAL ERROR: Database backup failed! Deployment aborted to prevent data loss."
            exit 1
          fi

          # .env backup - ПЕРЕД удалением папки!
          if [ -f ".env" ]; then
            echo "Creating .env backup..."
            sudo cp .env "/root/backups/env/env_${timestamp}"
            # Keep only 5 latest .env copies
            ls -t /root/backups/env/env_* | tail -n +6 | xargs -r sudo rm -f
          fi
          
          # Install Docker and Docker Compose if not installed
          echo "Checking Docker installation..."
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq ca-certificates curl gnupg lsb-release
            sudo mkdir -p /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            sudo systemctl start docker
            sudo systemctl enable docker
            echo "Docker installed successfully"
          else
            echo "Docker is already installed"
          fi
          
          # Install Docker Compose (standalone) if not available
          if ! command -v docker-compose &> /dev/null && ! docker compose version &> /dev/null; then
            echo "Installing Docker Compose..."
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            echo "Docker Compose installed successfully"
          else
            echo "Docker Compose is already installed"
          fi
          
          # Verify installations
          echo "Verifying installations..."
          docker --version || echo "Docker check failed"
          docker-compose --version || docker compose version || echo "Docker Compose check failed"
          
          # Download code directly to working directory
          echo "Downloading code..."
          sudo apt-get update -qq && sudo apt-get install -y -qq git sqlite3
          
          # Clone directly to working directory
          # IMPORTANT: Backup is already created above, safe to remove
          # But keep a safety copy just in case
          if [ -d "data" ] && [ -n "$(ls -A data/*.db 2>/dev/null)" ]; then
            echo "Creating safety copy before removal..."
            sudo mkdir -p /root/backups/safety
            sudo cp -r data/*.db /root/backups/safety/ 2>/dev/null || true
            echo "Safety copy created in /root/backups/safety/"
          fi
          
          sudo rm -rf /root/Daralla
          sudo mkdir -p /root/Daralla
          cd /root
          echo "Current directory: $(pwd)"
          echo "Directory contents: $(ls -la)"
          sudo git clone https://${{ github.repository_owner }}:${{ secrets.REPO_CLONE_TOKEN }}@github.com/${{ github.repository }}.git Daralla
          echo "After clone, directory contents: $(ls -la)"
          cd /root/Daralla
          echo "In Daralla directory: $(pwd)"
          
          # Checkout test branch
          sudo git checkout test
          sudo git pull origin test
          echo "Current commit: $(sudo git log --oneline -1)"
          
          # Restore data
          echo "Restoring data..."
          
          # Restore databases
          latest_db_backup=$(ls -t /root/backups/data/backup_*.tar.gz 2>/dev/null | head -n1)
          if [ -n "$latest_db_backup" ]; then
            echo "Restoring databases from $latest_db_backup..."
            
            # Verify backup file before restoration
            if ! sudo tar -tzf "$latest_db_backup" > /dev/null 2>&1; then
              echo "❌ ERROR: Backup file is corrupted or invalid: $latest_db_backup"
              echo "⚠️  Attempting to use previous backup..."
              # Try previous backup
              latest_db_backup=$(ls -t /root/backups/data/backup_*.tar.gz 2>/dev/null | head -n2 | tail -n1)
              if [ -z "$latest_db_backup" ] || ! sudo tar -tzf "$latest_db_backup" > /dev/null 2>&1; then
                echo "❌ ERROR: All backup files are corrupted or missing!"
                echo "⚠️  daralla.db will be created on startup (data loss possible)"
                sudo mkdir -p data
              else
                echo "✅ Using previous backup: $latest_db_backup"
              fi
            fi
            
            if [ -n "$latest_db_backup" ] && sudo tar -tzf "$latest_db_backup" > /dev/null 2>&1; then
              sudo mkdir -p data
              if sudo tar -xzf "$latest_db_backup" -C .; then
                echo "✅ Databases restored from $latest_db_backup"
              else
                echo "❌ ERROR: Failed to extract backup!"
                # Try safety copy as last resort
                if [ -d "/root/backups/safety" ] && [ -n "$(ls -A /root/backups/safety/*.db 2>/dev/null)" ]; then
                  echo "⚠️  Attempting to restore from safety copy..."
                  sudo cp /root/backups/safety/*.db data/ 2>/dev/null && echo "✅ Restored from safety copy" || echo "❌ Safety copy also failed, daralla.db will be created on startup"
                else
                  echo "⚠️  daralla.db will be created on startup (data loss possible)"
                fi
              fi
            else
              sudo mkdir -p data
              # Try safety copy as last resort
              if [ -d "/root/backups/safety" ] && [ -n "$(ls -A /root/backups/safety/*.db 2>/dev/null)" ]; then
                echo "⚠️  Attempting to restore from safety copy..."
                sudo cp /root/backups/safety/*.db data/ 2>/dev/null && echo "✅ Restored from safety copy" || echo "❌ Safety copy failed, daralla.db will be created on startup"
              fi
            fi
            
            # Clean up old database files (from old architecture)
            echo "Cleaning up old database files..."
            cd data
            for old_db in vpn_keys.db users.db subscribers.db notifications.db payments.db; do
              if [ -f "$old_db" ]; then
                echo "Removing old database file: $old_db"
                sudo rm -f "$old_db"
              fi
            done
            cd ..
            
            # Verify daralla.db exists and is valid
            echo "Verifying daralla.db..."
            if [ -f "data/daralla.db" ]; then
              echo "Checking daralla.db content..."
              if sudo sqlite3 data/daralla.db "SELECT name FROM sqlite_master WHERE type='table' LIMIT 1;" > /dev/null 2>&1; then
                echo "✅ daralla.db is valid"
                sudo sqlite3 data/daralla.db "SELECT COUNT(*) as total_subscriptions FROM subscriptions;" || echo "Cannot read subscriptions table"
              else
                echo "⚠️  daralla.db exists but is invalid or empty, will be recreated on startup"
                sudo rm -f data/daralla.db
              fi
            else
              echo "⚠️  daralla.db not found in backup, will be created on startup"
            fi
          else
            echo "Database backups not found - daralla.db will be created on startup"
            sudo mkdir -p data
          fi

          # Restore .env
          latest_env=$(ls -t /root/backups/env/env_* 2>/dev/null | head -n1)
          if [ -n "$latest_env" ]; then
            echo "Restoring .env from $latest_env..."
            sudo cp "$latest_env" .env
            echo ".env file restored"
          else
            echo ".env backup not found"
            # Create minimal .env file if it doesn't exist
            if [ ! -f ".env" ]; then
              echo "Creating minimal .env file..."
              echo "# Telegram Bot Configuration" | sudo tee .env > /dev/null
              echo "TELEGRAM_TOKEN=" | sudo tee -a .env > /dev/null
              echo "ADMIN_ID=" | sudo tee -a .env > /dev/null
              echo "# YooKassa Payment Configuration" | sudo tee -a .env > /dev/null
              echo "YOOKASSA_SHOP_ID=" | sudo tee -a .env > /dev/null
              echo "YOOKASSA_SECRET_KEY=" | sudo tee -a .env > /dev/null
              echo "# Webhook Configuration" | sudo tee -a .env > /dev/null
              echo "WEBHOOK_URL=" | sudo tee -a .env > /dev/null
              echo "⚠️  Minimal .env file created. Add servers via admin panel."
              echo "⚠️  Edit /root/Daralla/.env and add your configuration values"
            fi
          fi

          # Check restoration
          echo "Checking restored files..."
          echo "Databases in data directory:"
          ls -lh data/*.db 2>/dev/null || echo "No database files found (will be created on startup)"
          
          # Verify daralla.db structure
          if [ -f "data/daralla.db" ]; then
            echo "Checking daralla.db structure..."
            sudo sqlite3 data/daralla.db "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;" || echo "Cannot read daralla.db"
          else
            echo "ℹ️  daralla.db will be created automatically on first bot startup"
          fi
          
          # Fix permissions after restoration
          sudo chown -R 1000:1000 data/ 2>/dev/null || true
          sudo chmod -R 666 data/*.db 2>/dev/null || true
          sudo chmod 755 data/ 2>/dev/null || true
          
          # Ensure data directory exists
          sudo mkdir -p data
          
          # Set permissions
          sudo chmod +x *.sh
          sudo chown -R 1000:1000 data/
          sudo chmod -R 666 data/*.db
          sudo chmod 755 data/
          
          # WEBHOOK_URL и WEBAPP_URL не дописываются в .env при деплое — они должны быть в .env (или в бэкапе).
          echo "ℹ️  WEBHOOK_URL и WEBAPP_URL берутся из .env (не изменяются при деплое)"
          
          # Return to project directory
          cd /root/Daralla
          
          # Verify code update
          echo "Verifying code update..."
          echo "Current commit: $(sudo git log --oneline -1)"
          echo "Bot.py last modified: $(sudo stat -c %y bot/bot.py)"
          
          # Clean up old logs and containers
          echo "Cleaning up old logs and containers..."
          # Use docker compose (new) or docker-compose (old)
          if docker compose version &> /dev/null 2>&1; then
            sudo docker compose down || true
          elif command -v docker-compose &> /dev/null; then
            sudo docker-compose down || true
          else
            echo "Docker Compose not available, skipping cleanup"
          fi
          timeout 30 sudo docker image prune -f || echo "Image prune timed out, continuing..."
          timeout 30 sudo docker builder prune -f || echo "Builder prune timed out, continuing..."
          
          # Start bot
          echo "Starting bot..."
          # Build containers on server
          if docker compose version &> /dev/null 2>&1; then
            sudo docker compose build --no-cache
          elif command -v docker-compose &> /dev/null; then
            sudo docker-compose build --no-cache
          else
            echo "ERROR: Docker Compose not available!"
            exit 1
          fi
          
          # Start with environment variables
          echo "Starting bot with environment variables..."
          if docker compose version &> /dev/null 2>&1; then
            sudo docker compose up -d
          elif command -v docker-compose &> /dev/null; then
            sudo docker-compose up -d
          else
            echo "ERROR: Docker Compose not available!"
            exit 1
          fi
          
          # Check status
          echo "Checking status..."
          sleep 5
          if docker compose version &> /dev/null 2>&1; then
            sudo docker compose ps
          elif command -v docker-compose &> /dev/null; then
            sudo docker-compose ps
          else
            echo "WARNING: Cannot check status - Docker Compose not available"
          fi
          
          # Final verification of data
          echo "Final data verification..."
          sleep 3  # Wait for bot to initialize database
          if [ -f "data/daralla.db" ]; then
            echo "Final daralla.db check:"
            if sudo sqlite3 data/daralla.db "SELECT name FROM sqlite_master WHERE type='table' LIMIT 1;" > /dev/null 2>&1; then
              echo "✅ daralla.db is valid and initialized"
              sudo sqlite3 data/daralla.db "SELECT COUNT(*) as total_subscriptions FROM subscriptions;" || echo "Cannot read subscriptions table"
            else
              echo "⚠️  daralla.db exists but may not be initialized yet (check bot logs)"
            fi
          else
            echo "⚠️  daralla.db not found - check bot logs for initialization errors"
          fi
          
          echo "✅ Deployment to TEST server completed!"
          echo "🧪 Test environment is ready!"

    - name: Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment to TEST server completed successfully!"
          echo "🧪 Test environment is ready for testing!"
        else
          echo "❌ Deployment to TEST server failed!"
        fi

