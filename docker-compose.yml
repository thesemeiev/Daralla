services:
  telegram-bot:
    build: .
    container_name: daralla-bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Переменные окружения загружаются из .env файла
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_IDS=${ADMIN_ID}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - XUI_HOST_FINLAND=${XUI_HOST_FINLAND}
      - XUI_LOGIN_FINLAND=${XUI_LOGIN_FINLAND}
      - XUI_PASSWORD_FINLAND=${XUI_PASSWORD_FINLAND}
      - XUI_HOST_LATVIA=${XUI_HOST_LATVIA}
      - XUI_LOGIN_LATVIA=${XUI_LOGIN_LATVIA}
      - XUI_PASSWORD_LATVIA=${XUI_PASSWORD_LATVIA}
      - XUI_HOST_ESTONIA=${XUI_HOST_ESTONIA}
      - XUI_LOGIN_ESTONIA=${XUI_LOGIN_ESTONIA}
      - XUI_PASSWORD_ESTONIA=${XUI_PASSWORD_ESTONIA}
    volumes:
      # Монтируем папку для баз данных
      - ./data:/app/data:rw
      # Монтируем .env файл если он есть
      - ./.env:/app/.env:ro
    networks:
      - bot-network
    # Ограничения ресурсов для продакшена
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  bot-network:
    driver: bridge
