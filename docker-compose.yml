services:
  telegram-bot:
    build: .
    container_name: daralla-bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Переменные окружения загружаются из .env файла
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_IDS=${ADMIN_ID}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      # Finland серверы
      - XUI_HOST_FINLAND_1=${XUI_HOST_FINLAND_1}
      - XUI_LOGIN_FINLAND_1=${XUI_LOGIN_FINLAND_1}
      - XUI_PASSWORD_FINLAND_1=${XUI_PASSWORD_FINLAND_1}

      # Latvia серверы
      - XUI_HOST_LATVIA_1=${XUI_HOST_LATVIA_1}
      - XUI_LOGIN_LATVIA_1=${XUI_LOGIN_LATVIA_1}
      - XUI_PASSWORD_LATVIA_1=${XUI_PASSWORD_LATVIA_1}
      - XUI_HOST_LATVIA_2=${XUI_HOST_LATVIA_2}
      - XUI_LOGIN_LATVIA_2=${XUI_LOGIN_LATVIA_2}
      - XUI_PASSWORD_LATVIA_2=${XUI_PASSWORD_LATVIA_2}
      # Estonia серверы
      - XUI_HOST_ESTONIA_1=${XUI_HOST_ESTONIA_1}
      - XUI_LOGIN_ESTONIA_1=${XUI_LOGIN_ESTONIA_1}
      - XUI_PASSWORD_ESTONIA_1=${XUI_PASSWORD_ESTONIA_1}
      - XUI_HOST_ESTONIA_2=${XUI_HOST_ESTONIA_2}
      - XUI_LOGIN_ESTONIA_2=${XUI_LOGIN_ESTONIA_2}
      - XUI_PASSWORD_ESTONIA_2=${XUI_PASSWORD_ESTONIA_2}
    ports:
      # Открываем порт для webhook'ов YooKassa
      - "5000:5000"
    volumes:
      # Монтируем папку для баз данных
      - ./data:/app/data:rw
      # Монтируем .env файл если он есть
      - ./.env:/app/.env:ro
    networks:
      - bot-network
    # Ограничения ресурсов для продакшена
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  bot-network:
    driver: bridge
