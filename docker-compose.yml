services:
  telegram-bot:
    build: .
    container_name: daralla-bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      # Переменные окружения загружаются из .env файла
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_IDS=${ADMIN_ID}
      - ADMIN_ID=${ADMIN_ID}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      # Порт веб-сервера Quart/Hypercorn (должен совпадать с ports: и nginx)
      - WEBHOOK_PORT=${WEBHOOK_PORT:-5000}
      # Опциональные переменные (могут быть пустыми)
      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBAPP_URL=${WEBAPP_URL:-}
      - WEBSITE_URL=${WEBSITE_URL:-}
      - SUPPORT_URL=${SUPPORT_URL:-}
      - VPN_BRAND_NAME=${VPN_BRAND_NAME:-}
      - CRYPTOCLOUD_API_TOKEN=${CRYPTOCLOUD_API_TOKEN:-}
      - CRYPTOCLOUD_SHOP_ID=${CRYPTOCLOUD_SHOP_ID:-}
      - CRYPTOCLOUD_WEBHOOK_SECRET=${CRYPTOCLOUD_WEBHOOK_SECRET:-}
      - PLATEGA_MERCHANT_ID=${PLATEGA_MERCHANT_ID:-}
      - PLATEGA_SECRET=${PLATEGA_SECRET:-}
      - PLATEGA_BASE_URL=${PLATEGA_BASE_URL:-}
      - PLATEGA_CREATE_PATH=${PLATEGA_CREATE_PATH:-}
      - PLATEGA_PAYMENT_METHOD=${PLATEGA_PAYMENT_METHOD:-2}
      - PLATEGA_CURRENCY=${PLATEGA_CURRENCY:-RUB}
      - PLATEGA_RETURN_URL=${PLATEGA_RETURN_URL:-}
      - PLATEGA_FAILED_URL=${PLATEGA_FAILED_URL:-}
      # Модуль событий (рефералки): без этой строки в environment значение из .env не попадает в контейнер
      - EVENTS_MODULE_ENABLED=${EVENTS_MODULE_ENABLED:-0}
      - EVENTS_SUPPORT_URL=${EVENTS_SUPPORT_URL:-}
    dns:
      - 1.1.1.1
      - 8.8.8.8


    ports:
      # Открываем порт для webhook'ов YooKassa
      - "5000:5000"
    volumes:
      # Монтируем папку для баз данных
      - ./data:/app/apps/backend/src/data:rw
      # Монтируем .env файл если он есть
      - ./.env:/app/.env:ro
    networks:
      - bot-network
    # Память: Quart + бот + параллельные запросы к X-UI + sync тянут больше 512M.
    # mem_limit — для обычного `docker compose up` (ограничение cgroups).
    # deploy.resources — для Swarm / `docker stack deploy`; иначе можно игнорироваться.
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

networks:
  bot-network:
    driver: bridge
