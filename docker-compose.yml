services:
  telegram-bot:
    build: .
    container_name: daralla-bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Переменные окружения загружаются из .env файла
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
    volumes:
      # Монтируем папку для баз данных
      - ./data:/app/data:rw
      # Монтируем .env файл если он есть
      - ./.env:/app/.env:ro
    networks:
      - bot-network
    # Ограничения ресурсов для продакшена
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  bot-network:
    driver: bridge
