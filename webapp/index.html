<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мои подписки - Daralla VPN</title>
    <link rel="stylesheet" href="/webapp/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Мои подписки</h1>
        </header>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Загрузка подписок...</p>
        </div>
        
        <div id="error" class="error" style="display: none;">
            <p>Ошибка загрузки данных</p>
            <button onclick="loadSubscriptions()">Повторить</button>
        </div>
        
        <div id="empty" class="empty" style="display: none;">
            <p>У вас пока нет подписок</p>
            <p class="hint">Купите подписку в боте, чтобы начать пользоваться VPN</p>
        </div>
        
        <div id="subscriptions" class="subscriptions" style="display: none;">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Всего:</span>
                    <span class="stat-value" id="total-count">0</span>
                </div>
                <div class="stat-item active">
                    <span class="stat-label">Активных:</span>
                    <span class="stat-value" id="active-count">0</span>
                </div>
            </div>
            
            <div id="subscriptions-list"></div>
        </div>
    </div>
    
    <script src="/webapp/app.js"></script>
</body>
</html>
