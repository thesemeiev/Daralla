<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daralla VPN</title>
    <meta name="theme-color" content="#1a1a2e">
</head>
<body style="margin:0;background:#1a1a2e;color:#fff;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
    <h1 style="margin:0;font-size:1.75rem;">Daralla VPN</h1>
    <p style="margin:8px 0 0;opacity:0.9;font-size:1rem;">Безопасный доступ туда, где всё ещё работает</p>
    <p id="splash-status" style="margin:16px 0 0;font-size:0.875rem;opacity:0.7;">Загрузка…</p>
    <script>
        (function () {
            var el = document.getElementById('splash-status');
            if (el) el.textContent = navigator.onLine ? 'Загрузка…' : 'Нет соединения. Проверьте интернет.';
        })();
    </script>
</body>
</html>
